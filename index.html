<!DOCTYPE html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#070D1A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DSE Trader" />
    <title>DSE Trading Dashboard</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #070D1A; color: #E8EAF0; font-family: Inter, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
      #loading {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; flex-direction: column; gap: 16px;
      }
      .load-icon { font-size: 56px; animation: pulse 1.5s ease-in-out infinite; }
      .load-text { color: #00C896; font-weight: 700; font-size: 16px; }
      .load-sub { color: #4A6080; font-size: 12px; }
      @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.95)} }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading">
        <div class="load-icon">📊</div>
        <div class="load-text">DSE Trading Dashboard</div>
        <div class="load-sub">লোড হচ্ছে...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
